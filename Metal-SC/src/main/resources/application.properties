spring.application.name=Metal-SC
spring.config.import=optional:file:.env[.properties],optional:file:Metal-SC/.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/metalsc}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Taxa e premium (configuravel)
app.taxa.percent=0.05
app.taxa.limite=0.0
app.premium.dias=30

# Admin seed (somente para dev). Troque a senha antes de usar em producao.
app.admin.enabled=${ADMIN_ENABLED:true}
app.admin.email=${ADMIN_EMAIL:admin@metal.com}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.nome=${ADMIN_NAME:Administrador}
